<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background: deep near-black -->
  <rect width="512" height="512" rx="112" fill="#0A0A0B"/>

  <!-- Subtle inner border for app-icon depth -->
  <rect x="2" y="2" width="508" height="508" rx="111" fill="none" stroke="#1A1A1F" stroke-width="1"/>

  <!-- Big monospace π glyph, custom-drawn for crisp rendering at any size -->
  <!-- Top horizontal bar -->
  <rect x="112" y="160" width="288" height="36" rx="2" fill="#F5F5F0"/>
  <!-- Left leg -->
  <rect x="156" y="196" width="36" height="180" rx="2" fill="#F5F5F0"/>
  <!-- Right leg with foot curl -->
  <rect x="320" y="196" width="36" height="148" rx="2" fill="#F5F5F0"/>
  <rect x="320" y="344" width="56" height="32" rx="2" fill="#F5F5F0"/>

  <!-- Notification badge: amber dot in upper-right, classic iOS-style -->
  <circle cx="412" cy="112" r="44" fill="#0A0A0B"/>
  <circle cx="412" cy="112" r="34" fill="#FFB454"/>
  <!-- Tiny inner highlight to give the dot life -->
  <circle cx="402" cy="102" r="8" fill="#FFCB7E" opacity="0.6"/>
</svg>
